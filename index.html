<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau d'Émotions avec Surbrillance Aléatoire</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 30px;
            width: 90%;
            max-width: 800px;
            margin-bottom: 20px;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-top: 0;
        }
        .emotions-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 25px 0;
        }
        .emotion {
            padding: 12px 18px;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 25px;
            font-size: 16px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .emotion:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .highlight {
            background: linear-gradient(135deg, #fff200, #ffd700);
            color: #d63031;
            font-weight: bold;
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 15px rgba(255, 242, 0, 0.5);
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }
        .refresh-btn {
            background: #e74c3c;
        }
        .refresh-btn:hover {
            background: #c0392b;
        }
        .count-display {
            text-align: center;
            margin: 15px 0;
            font-size: 18px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tableau d'Émotions avec Surbrillance Aléatoire</h1>

        <div class="count-display" id="countDisplay">
            0 émotion(s) surbrillant(e)s
        </div>

        <div class="emotions-container" id="emotionsContainer">
            <!-- Les émotions seront insérées ici par JavaScript -->
        </div>

        <div class="controls">
            <button onclick="highlightRandomEmotions()">Surbrillance Aléatoire</button>
            <button class="refresh-btn" onclick="resetHighlights()">Réinitialiser</button>
        </div>
    </div>

    <script>
        // Liste complète de toutes les émotions
        const allEmotions = [
            "Amoureux", "Agacé", "Angoissé", "Abattu", "Ébahi", "Aigri",
            "Content", "Agité", "Anxieux", "Accablé", "Émerveillé", "Amer",
            "Enchanté", "Agressif", "Craintif", "Affligé", "Enthousiaste", "Aversion",
            "Enjoué", "Contrarié", "Effrayé", "Blessé", "Étonné",
            "Euphorique", "Exaspéré", "Inquiet", "Chagriné", "Impatient", "Écoeuré",
            "Excité", "Froissé", "Horrifié", "Déçu", "Secoué", "Intimidé",
            "Passionné", "Furieux", "Méfiant", "Désespéré", "Sidéré", "Irritable",
            "Réjoui", "Hostile", "Préoccupé", "Désolé", "Stupéfait", "Mépris",
            "Satisfait", "Irrité", "Terrifié", "Navré", "Troublé", "Rejet"
        ];

        // Afficher toutes les émotions au chargement
        function displayEmotions() {
            const container = document.getElementById('emotionsContainer');
            container.innerHTML = '';

            allEmotions.forEach(emotion => {
                const emotionElement = document.createElement('div');
                emotionElement.className = 'emotion';
                emotionElement.textContent = emotion;
                container.appendChild(emotionElement);
            });
        }

        // Appliquer une surbrillance aléatoire
        function highlightRandomEmotions() {
            // Réinitialiser les surbrillances existantes
            resetHighlights();

            // Nombre aléatoire d'émotions à surbriller (entre 3 et 8)
            const count = Math.floor(Math.random() * 6) + 3;

            // Mélanger le tableau pour une sélection aléatoire
            const shuffled = [...allEmotions].sort(() => 0.5 - Math.random());

            // Sélectionner les premières 'count' émotions après mélange
            const selectedEmotions = shuffled.slice(0, count);

            // Appliquer la classe highlight
            selectedEmotions.forEach(emotion => {
                const elements = document.querySelectorAll('.emotion');
                elements.forEach(el => {
                    if (el.textContent === emotion) {
                        el.classList.add('highlight');
                    }
                });
            });

            // Mettre à jour le compteur
            document.getElementById('countDisplay').textContent =
                `${count} émotion(s) surbrillant(e)s`;
        }

        // Réinitialiser toutes les surbrillances
        function resetHighlights() {
            const emotions = document.querySelectorAll('.emotion');
            emotions.forEach(emotion => {
                emotion.classList.remove('highlight');
            });
            document.getElementById('countDisplay').textContent =
                '0 émotion(s) surbrillant(e)s';
        }

        // Initialisation
        window.onload = function() {
            displayEmotions();
        };
    </script>
</body>
</html>
